- name: Configure wavm
  hosts: wavm
  gather_facts: false
  pre_tasks:
    - name: Wait for PSRP listener to accept connections
      ansible.builtin.wait_for_connection:
        delay: 0
        sleep: 10
        timeout: 900
  roles:
    - role: ansible-role-user-access-windows
      user_access_username: LocalAdmin
      user_access_password: Password123!
      user_access_rdp: True
      user_access_admin: True
  tasks:
    - name: Install Git and Strawberry Perl via Chocolatey
      chocolatey.chocolatey.win_chocolatey:
        name:
          - git
          - strawberryperl
        state: present

    - name: Ensure DumpIt destination exists
      ansible.windows.win_file:
        path: C:\Tools\DumpIt
        state: directory

    - name: Download DumpIt for Windows
      ansible.windows.win_get_url:
        url: https://github.com/thimbleweed/All-In-USB/raw/master/utilities/DumpIt/DumpIt.exe
        dest: C:\Tools\DumpIt\DumpIt.exe

    - name: Create DumpIt shortcut on the public Desktop
      community.windows.win_shortcut:
        src: C:\Tools\DumpIt\DumpIt.exe
        dest: C:\Users\Public\Desktop\DumpIt.lnk
        description: DumpIt - Memory acquisition tool

    - name: Ensure Strings destination exists
      ansible.windows.win_file:
        path: C:\Tools\Strings
        state: directory

    - name: Download Sysinternals Strings
      ansible.windows.win_get_url:
        url: https://download.sysinternals.com/files/Strings.zip
        dest: C:\Windows\Temp\Strings.zip

    - name: Extract Strings
      community.windows.win_unzip:
        src: C:\Windows\Temp\Strings.zip
        dest: C:\Tools\Strings

    - name: Remove temp files
      ansible.windows.win_file:
        path: C:\Windows\Temp\Strings.zip
        state: absent

    - name: Ensure Investigation share directory exists
      ansible.windows.win_file:
        path: C:\Investigation
        state: directory

    - name: Grant Everyone Modify on Investigation folder (NTFS)
      ansible.windows.win_acl:
        path: C:\Investigation
        user: Everyone
        rights: Modify
        type: allow
        state: present
        inherit: ContainerInherit, ObjectInherit
        propagation: None

    - name: Create Investigation SMB share with Everyone read/write
      ansible.windows.win_share:
        name: investigation
        path: C:\Investigation
        description: Forensic investigation share (read/write for Everyone)
        change: Everyone
        read: Everyone
        state: present

- name: Configure lvvm
  hosts: lvvm
  gather_facts: true
  become: true
  pre_tasks:
    - name: Wait for SSH to accept connections
      ansible.builtin.wait_for_connection:
        delay: 0
        sleep: 10
        timeout: 900
  roles:
    - role: ansible-role-user-access
      user_access_username: Maria
      user_access_password: Password123!
      user_access_ssh: true
      user_access_sudo: true
  tasks:
    - name: Install git and gcc
      ansible.builtin.apt:
        name:
          - git
          - gcc
        state: present
        update_cache: true

    - name: Copy std_service source to lvvm
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../std_service_linux.c"
        dest: /tmp/std_service.c
        mode: "0644"

    - name: Compile std_service
      ansible.builtin.command: gcc -O2 -o /usr/local/bin/std_service /tmp/std_service.c
      args:
        creates: /usr/local/bin/std_service

    - name: Launch std_service on shell login (SSH, console)
      ansible.builtin.copy:
        dest: /etc/profile.d/std_service.sh
        mode: "0755"
        content: |
          #!/bin/sh
          # Forensics lab: keep the flag string resident in user-process memory.
          if ! pgrep -u "$(id -u)" -x std_service > /dev/null 2>&1; then
              /usr/local/bin/std_service > /dev/null 2>&1
          fi

    - name: Launch std_service on graphical login (XDG autostart)
      ansible.builtin.copy:
        dest: /etc/xdg/autostart/std_service.desktop
        mode: "0644"
        content: |
          [Desktop Entry]
          Type=Application
          Name=Std Service
          Exec=/usr/local/bin/std_service
          NoDisplay=true
          X-GNOME-Autostart-enabled=true

    - name: Ensure AVML destination exists
      ansible.builtin.file:
        path: /opt/avml
        state: directory
        mode: "0755"

    - name: Download AVML (Linux memory acquisition)
      ansible.builtin.get_url:
        url: https://github.com/microsoft/avml/releases/latest/download/avml
        dest: /opt/avml/avml
        mode: "0755"

    - name: Symlink avml into /usr/local/bin
      ansible.builtin.file:
        src: /opt/avml/avml
        dest: /usr/local/bin/avml
        state: link

- name: Configure wvvm
  hosts: wvvm
  gather_facts: false
  pre_tasks:
    - name: Wait for PSRP listener to accept connections
      ansible.builtin.wait_for_connection:
        delay: 0
        sleep: 10
        timeout: 900
  roles:
    - role: ansible-role-user-access-windows
      user_access_username: LocalAdmin
      user_access_password: Password123!
      user_access_rdp: True
      user_access_admin: True
  tasks:
    - name: Ensure std_service directory exists
      ansible.windows.win_file:
        path: C:\ProgramData\StdService
        state: directory

    - name: Copy std_service.exe to wvvm
      ansible.windows.win_copy:
        src: "{{ playbook_dir }}/../std_service.exe"
        dest: C:\ProgramData\StdService\std_service.exe

    - name: Run std_service.exe at user logon
      ansible.windows.win_regedit:
        path: HKLM:\Software\Microsoft\Windows\CurrentVersion\Run
        name: StdService
        data: C:\ProgramData\StdService\std_service.exe
